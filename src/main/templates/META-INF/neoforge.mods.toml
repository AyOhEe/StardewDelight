modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL="https://github.com/AyOhEe/StardewDelight/issues"

[[mods]]
    modId = "${mod_id}"
    version = "${mod_version}"
    displayName = "${mod_name}"
    displayURL = "https://github.com/AyOhEe/StardewDelight"
    #logoFile="stardewdelight.png"
    credits="ConcernedApe of Stardew Valley, for a beautiful game and the crop and dish ideas"
    authors = "${mod_authors}"
    description = '''${mod_description}'''

[[dependencies."${mod_id}"]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies."${mod_id}"]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies."${mod_id}"]]
    modId = "farmersdelight"
    type = "required"
    versionRange = "${farmers_delight_version_range}"
    ordering = "BEFORE"
    side = "BOTH"